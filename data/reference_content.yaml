# Reference & Methodology tab content
# Prose is authored deliberately; tables and multipliers are rendered
# dynamically from config.py at runtime.

intro: |
  This tab documents the analytical framework, risk scoring methodology,
  data source provenance, and scope of the Med Vessel Behaviour Monitor.
  All numerical values (multipliers, flag weights, risk bands) are rendered
  directly from the application configuration at load time, so what you
  see here is what the scoring engine actually applies.

risk_formula_explanation: |
  Risk is computed per event, then compounded with vessel-level lookups.
  The base behavioural score uses a non-linear duration term that dampens
  the contribution of very long events, multiplied by event weight, flag
  risk, shore distance factor, and event-type-specific factors. After base
  scoring, three independent lookup multipliers are applied in sequence:
  IUU listing, ICCAT authorisation, and OFAC sanctions. All lookup
  multipliers amplify existing behavioural signal; they never substitute
  for it. A vessel with no suspicious AIS behaviour carries no score,
  regardless of its authorisation or listing status.

  The exponent on duration (0.75) is a heuristic chosen to prevent linear
  dominance of long gaps while preserving monotonicity. It is not
  empirically calibrated against enforcement outcomes.

  The current implementation covers AIS gaps, encounters, and loitering
  because these are the event types provided by the Global Fishing Watch
  Events API. AIS spoofing — widely cited as the single strongest
  predictive signal for sanctions risk — is not currently modelled
  because detection requires satellite cross-reference verification
  rather than AIS inference alone. Adding a spoofing detection layer
  would require integrating satellite imagery sources and is named as
  future work. The distinction matters analytically: AIS gaps can result
  from equipment failure or signal occlusion, whereas deliberate spoofing
  is a signal of intent, and is therefore the highest-priority behavioural
  indicator in the commercial literature.

  In addition to the core scoring formula, three compound / temporal
  behavioural flags are computed at the vessel level and displayed in
  the Vessel Summary tab without modifying the risk score itself: a
  multi-behaviour compound indicator (vessel shows two or more distinct
  event types), a dark port call candidate flag (loitering within 10 km
  of shore — not satellite-verified, hence "candidate"), and a
  repeat-offender flag (two or more events within a 90-day window,
  capturing exposure drift over time). These flags are displayed
  separately from the risk score rather than multiplied into it, because
  they are partly redundant with signals already captured in the
  event-level scoring, and adding them as multipliers would risk
  double-counting.

iccat_framing_note: |
  ICCAT authorisation is treated as an opportunity indicator, not an
  exoneration. Carrier, bluefin tuna, swordfish, and albacore
  authorisations increase risk only when behavioural signal is already
  present. The logic: authorisation to fish high-value species or to
  operate as a carrier creates the conditions under which IUU behaviour
  is most consequential, so conditional on suspicious AIS patterns, these
  vessels warrant elevated scrutiny. An ICCAT-authorised vessel with no
  suspicious behaviour receives no risk score at all.

mpa_framing_note: |
  MPA intersection is a spatial rule-zone signal, not a list lookup, and
  therefore composes into the base behavioural score rather than the
  compound multiplier chain. The data substrate is GFW's regions.mpa
  field on every Events API response — a point-in-polygon check run
  server-side against the WDPA (World Database on Protected Areas). No
  local shapefile ingestion is required.

  Classification is by substring match on the MPA name returned by GFW,
  assigning one of three tiers:

  - gfcm_fra (2.0x) — GFCM Fisheries Restricted Areas, legally binding
    under Council Regulation (EC) No 1967/2006. Parity with "other RFMO
    IUU listing" because both signals reflect formal rule violation
    within a Mediterranean regulatory instrument.
  - eu_site (1.5x) — Natura 2000 marine sites, Pelagos Sanctuary,
    national marine parks. Rule zones with regulatory backing but
    weaker enforcement teeth than GFCM FRAs.
  - general (1.2x) — other WDPA entries. Contextual signal only; sits
    below flag-of-convenience in the overall ordering.

  Calibration is by regulatory tier rather than empirical outcomes — no
  Mediterranean enforcement-outcome dataset of the required scale exists
  publicly. The same validation gap applies to every weight in the
  model, not only this one. Sensitivity sweeps across gfcm_fra in
  {1.5, 2.0, 2.5, 3.0} preserve top-N vessel ordering and keep every
  top-10 vessel in the Critical band — calibration sits in a stable
  plateau.

  AIS-only caveat. McDonald et al. 2024 (Nature) found roughly 75
  percent of SAR-detected fishing vessels globally are AIS-dark, and
  the gap inside MPAs is closer to 90 percent. An AIS-based MPA
  intersection is therefore a lower-bound indicator on broadcasting
  vessels. It is complementary to the existing AIS-gap evasion signal
  rather than a replacement for SAR verification: a vessel that went
  dark before entering an MPA surfaces through the gap event; a vessel
  broadcasting inside an MPA surfaces through the MPA factor. The two
  layers compose without double-counting.

sanctions_authority_note: |
  Formal fisheries enforcement coverage comes primarily through the
  TMT Combined IUU Vessel List, which aggregates listings from 13 RFMOs
  and mirrors the EU IUU vessel list maintained under Article 30 of
  Council Regulation (EC) No 1005/2008. Vessels IUU-listed anywhere
  globally — including those mirrored from the EU IUU list into the RFMO
  network — appear in this integrated source. GFCM-listed vessels carry
  the highest multiplier (3.0x) because GFCM is the Mediterranean-specific
  RFMO; other RFMO listings carry 2.0x.

  The current implementation does not tag listings by issuing authority.
  Adding authority-level filtering — RFMO, EU IUU, GFCM-specific — would
  allow users to distinguish listings by OFAC, OFSI, FCDO, UN, and EU
  authorities. This is named as a natural next integration step.

  OFAC SDN is integrated as baseline sanctions screening per industry
  practice, but it is less directly relevant for Mediterranean fisheries
  than for oil tanker compliance. The primary sanctions authority
  operating on Med-flagged fishing vessels is the EU, through the EU
  consolidated sanctions list. Adding EU consolidated sanctions as a
  distinct data source is named as the natural next priority for broader
  shadow fleet and dual-use concerns in the Mediterranean.

data_source_provenance:
  - source: "GFW Events API"
    content: "AIS gap, encounter, and loitering events"
    status: "Event-level inference from AIS"
    coverage: "Mediterranean polygon, up to 5000 events per query"
    notes: "Methodology aligned with Miller et al. 2018 transshipment detection. AIS spoofing is not in the feed and would require separate satellite verification integration."

  - source: "GFW regions.mpa (WDPA)"
    content: "Point-in-polygon intersection of every event against the World Database on Protected Areas"
    status: "Pre-computed server-side by GFW, returned in the Events API response itself"
    coverage: "Global; classified into three tiers (gfcm_fra / eu_site / general) by substring match on the MPA name"
    notes: "Applied as a spatial factor in the base behavioural score, not as a compound multiplier. AIS-only — McDonald et al. 2024 bounds this to a lower-bound signal on broadcasting vessels."

  - source: "EU JRC FDI spatial data"
    content: "Fishing effort and landings by 0.5 degree c-square"
    status: "Aggregate statistical estimate from logbooks and sampling"
    coverage: "Mediterranean only, 2017-2024, EU member state vessels only"
    notes: "No coverage for Libya, Tunisia, eastern Mediterranean, North Africa. C-squares with fewer than three vessels suppressed for confidentiality."

  - source: "TMT Combined IUU Vessel List"
    content: "369 vessels from 13 RFMOs, mirrors EU IUU list under Article 30 of Reg 1005/2008"
    status: "Enforcement action — RFMO and EU IUU listing"
    coverage: "64 vessels with MMSI, 168 with IMO. GFCM-listed 3.0x, other RFMO 2.0x"
    notes: "Matching priority MMSI, IMO, name exact, name fuzzy. Authority-level tagging is future work."

  - source: "ICCAT Record of Vessels"
    content: "9,203 vessels Med-authorised for SWO, ALB, BFT, or carrier operation"
    status: "Authorisation — opportunity indicator, not risk in isolation"
    coverage: "786 vessels with IMO"
    notes: "Applied conditionally on behavioural signal. See ICCAT framing note."

  - source: "OFAC SDN list"
    content: "US Treasury specially designated nationals"
    status: "Formal sanctions listing (US authority)"
    coverage: "Global, but less directly relevant for Med fisheries than EU sanctions"
    notes: "No fuzzy matching — false positives have legal consequences. EU consolidated sanctions list is named as the next integration priority."

epistemological_separation: |
  Each data source answers a different question and is kept separate at
  the data layer. GFW provides AIS-inferred behavioural events; FDI
  provides aggregate statistical estimates; TMT provides enforcement
  actions from both RFMO and EU sources; ICCAT provides authorisation as
  an opportunity indicator; OFAC provides formal US sanctions listings.
  The sources are synthesised at the scoring layer with provenance
  preserved in the UI.

methodology_references:
  - title: Identifying global patterns of transshipment behavior
    citation: "Miller, N. A., Roan, A., Hochberg, T., Amos, J., & Kroodsma, D. A. (2018). *Frontiers in Marine Science*, 5, 240. https://doi.org/10.3389/fmars.2018.00240"
    relevance: Defines the encounter criteria (≤500 m, ≥2 h, <2 kn median speed, ≥10 km from shore) implemented in compute_risk_score, and the "likely vs potential transshipment" distinction used in loitering weighting.

  - title: "Shadow Fleets: A Growing Challenge in Global Maritime Commerce"
    citation: "Rodriguez-Diaz, E., Alcaide, J. I., & Endrina, N. (2025). *Applied Sciences*, 15(12), 6424. https://doi.org/10.3390/app15126424"
    relevance: Dark/gray/light fleet taxonomy, six-indicator detection framework, and explicit treatment of fishing as a shadow fleet subcategory. Reference point for crosswalk between fisheries IUU and oil-tanker shadow fleet work.

  - title: "Turning Tides: Maritime Risk and Compliance Insights 2025–2026"
    citation: Kpler (December 2025)
    relevance: Source of the Low / Emerging / Elevated / Severe / Critical risk band vocabulary used throughout the app, and the AQUARIS (IMO 9251822) case study framing for pre-sanction predictive scoring.

  - title: "AIS Spoofing: Fast Track to Sanctions"
    citation: Kpler (November 2025)
    relevance: Quantifies the 80% probability of formal sanction within 12 months of a confirmed spoofing event, concentrated in months 3–9. Motivates the pre-enforcement predictive framing of the scoring model.

  - title: How Deception Detection Works
    citation: Kpler (2025)
    relevance: Formal six-layer risk framework — formal sanctions, behavioural indicators, associative risk, geographic risk, cargo risk, ownership opacity. Four of the six map directly to the current implementation.

  - title: "The Grey Fleet: Shadow Operations in Global Oil Trade"
    citation: "Kpler (March 2025). Authors: Ampatzidis, D., Stuart-Grumbar, A., Kinnee, K., Wright, M."
    relevance: Multiplicative compounding of behavioural, flag, cargo, geographic, and ownership factors in commercial maritime compliance. Methodological template for the multiplicative structure of compute_risk_score.

  - title: How to build a risk tree to assess shadow fleet exposure
    citation: Kpler (April 2026)
    relevance: Direct source for the hierarchical risk tree framework adapted in risk_tree_framework.yaml — gating, additive, and contextual branch typing; compound-logic tier assignment.

  - title: Council Regulation (EC) No 1005/2008 — EU IUU Regulation
    citation: EU 2008, amended by Regulation (EU) 2023/2842 (in force 9 January 2024)
    relevance: Establishes the EU IUU vessel list (Article 30), catch certification, yellow/red card system. The 2024 amendment mandates risk-based control targeting and beneficial ownership obligations — regulatory demand for scoring tools of this kind.

  - title: "Assessing industrial fishing inside the world's most protected marine areas"
    citation: "Welch, H., et al. (2025). *Science* (via Global Fishing Watch)."
    relevance: Compliance base rate inside highly/fully protected MPAs using AIS + SAR. Most bans are respected; the non-compliant tail is small and AIS-based intersection reliably surfaces it. Anchor for the MPA multiplier calibration — the tiered 1.2x / 1.5x / 2.0x values approximate the posterior shift implied by Welch's compliance base rate when combined with ordinal parity against the existing IUU/flag chain.

  - title: "Satellite mapping reveals extensive industrial activity at sea"
    citation: "McDonald, G. G., et al. (2024). *Nature*, 625, 85-91. https://doi.org/10.1038/s41586-023-06825-8"
    relevance: AIS-vs-SAR coverage gap — roughly 75 percent of SAR-detected fishing vessels are AIS-dark, and ~90 percent inside MPAs. Basis for the "lower-bound signal" epistemic framing of the MPA factor; bounds the claim that AIS-based MPA intersection can make.

  - title: "Illegal fishing in Mediterranean closed areas"
    citation: Global Fishing Watch (2021). 305 bottom-trawlers tracked across 35 Mediterranean closed areas; 9,518 days of apparent illegal fishing, January 2020 – December 2021.
    relevance: Direct precedent for the MPA intersection methodology on Mediterranean vessels using GFW data alone. Establishes that AIS-based closed-area monitoring is already the field-standard approach for Mediterranean IUU analysis.

  - title: "Council Regulation (EC) No 1967/2006 — Mediterranean management measures"
    citation: EU 2006.
    relevance: Legal basis for GFCM Fisheries Restricted Areas and Mediterranean trawl-ban zones. Underpins the 2.0x gfcm_fra tier in MPA multiplier calibration — GFCM FRA violations are legally binding, hence parity with "other RFMO IUU listing" in the compliance chain.

scope_and_limitations: |
  Geographic. Mediterranean polygon only. FDI covers EU member state
  fleets only — no coverage for Libya, Tunisia, eastern Mediterranean,
  North Africa.

  Temporal. FDI reliable from 2017 onwards. Live mode pulls current GFW
  events subject to API rate limits; static mode uses a fixed 86-event
  demo dataset.

  Spatial resolution. GFW events are point-level; FDI is aggregated to
  0.5 degree c-squares. Joining loses precision.

  Confidentiality suppression. FDI c-squares with fewer than three
  vessels are suppressed by Eurostat.

  Detection substrate. The model relies on AIS-inferred events from GFW.
  Commercial detection stacks combine AIS with analyst-verified satellite
  imagery, which provides ground-truth confirmation for dark port calls
  and direct detection of AIS spoofing — neither of which are available
  from AIS inference alone. This is a legitimate substrate difference
  and a named area for future integration.

  Validation. Risk scores are methodology-driven, not empirically
  calibrated against enforcement outcomes. Validation would require
  proxy outcomes such as RFMO IUU list additions or port state denials.

  Identity matching. Subject to false positives on common vessel names.
  Minimum name length four characters; all name matches require exact
  string match. OFAC uses no fuzzy matching.

  Authority tagging. TMT aggregates RFMO and EU IUU listings but does
  not tag by issuing authority. Authority-level filtering is future work.

  Descriptive not predictive. The app assigns risk given observed
  behaviour; it does not forecast future enforcement. Building a
  predictive model would require a historical designation dataset
  tied to fisheries IUU outcomes at comparable scale, which does not
  yet exist.
