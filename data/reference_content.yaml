# Reference & Methodology tab content
# Prose is authored deliberately; tables and multipliers are rendered
# dynamically from config.py at runtime.

intro: |
  This tab documents the analytical framework, risk scoring methodology,
  data source provenance, and scope of the Med Vessel Behaviour Monitor.
  All numerical values (multipliers, flag weights, risk bands) are rendered
  directly from the application configuration at load time, so what you
  see here is what the scoring engine actually applies.

risk_formula_explanation: |
  Risk is computed per event, then compounded with vessel-level lookups.
  The base behavioural score uses a non-linear duration term that dampens
  the contribution of very long events, multiplied by event weight, flag
  risk, shore distance factor, and event-type-specific factors. After base
  scoring, three independent lookup multipliers are applied in sequence:
  IUU listing, ICCAT authorisation, and OFAC sanctions. All lookup
  multipliers amplify existing behavioural signal; they never substitute
  for it. A vessel with no suspicious AIS behaviour carries no score,
  regardless of its authorisation or listing status.

  The exponent on duration (0.75) is a heuristic chosen to prevent linear
  dominance of long gaps while preserving monotonicity. It is not
  empirically calibrated against enforcement outcomes.

  The current implementation covers AIS gaps, encounters, and loitering
  because these are the event types provided by the Global Fishing Watch
  Events API. AIS spoofing — which Kpler identifies as the single
  strongest predictive signal, with approximately 80% of spoofing vessels
  sanctioned within 12 months concentrated in months 3 to 9 after the
  first incident — is not currently modelled because detection requires
  satellite cross-reference verification rather than AIS inference alone.
  Adding a spoofing detection layer would require integrating satellite
  imagery sources and is named as future work. The distinction matters
  analytically: AIS gaps can result from equipment failure or signal
  occlusion, whereas deliberate spoofing is a signal of intent, which is
  why Kpler weights it as the highest-priority behavioural indicator.

iccat_framing_note: |
  ICCAT authorisation is treated as an opportunity indicator, not an
  exoneration. Carrier, bluefin tuna, swordfish, and albacore
  authorisations increase risk only when behavioural signal is already
  present. The logic: authorisation to fish high-value species or to
  operate as a carrier creates the conditions under which IUU behaviour
  is most consequential, so conditional on suspicious AIS patterns, these
  vessels warrant elevated scrutiny. An ICCAT-authorised vessel with no
  suspicious behaviour receives no risk score at all.

sanctions_authority_note: |
  Formal fisheries enforcement coverage comes primarily through the
  TMT Combined IUU Vessel List, which aggregates listings from 13 RFMOs
  and mirrors the EU IUU vessel list maintained under Article 30 of
  Council Regulation (EC) No 1005/2008. Vessels IUU-listed anywhere
  globally — including those mirrored from the EU IUU list into the RFMO
  network — appear in this integrated source. GFCM-listed vessels carry
  the highest multiplier (3.0x) because GFCM is the Mediterranean-specific
  RFMO; other RFMO listings carry 2.0x.

  The current implementation does not tag listings by issuing authority.
  Adding authority-level filtering — RFMO, EU IUU, GFCM-specific — would
  match the filtering model used in Kpler's Risk and Compliance product,
  which lets users distinguish listings by OFAC, OFSI, FCDO, UN, and EU
  authorities. This is named as a natural next integration step.

  OFAC SDN is integrated as baseline sanctions screening per industry
  practice, but it is less directly relevant for Mediterranean fisheries
  than for oil tanker compliance. The primary sanctions authority
  operating on Med-flagged fishing vessels is the EU, through the EU
  consolidated sanctions list. Adding EU consolidated sanctions as a
  distinct data source is named as the natural next priority for broader
  shadow fleet and dual-use concerns in the Mediterranean.

data_source_provenance:
  - source: "GFW Events API"
    content: "AIS gap, encounter, and loitering events"
    status: "Event-level inference from AIS"
    coverage: "Mediterranean polygon, up to 5000 events per query"
    notes: "Methodology aligned with Miller et al. 2018 transshipment detection. AIS spoofing is not in the feed and would require separate satellite verification integration."

  - source: "EU JRC FDI spatial data"
    content: "Fishing effort and landings by 0.5 degree c-square"
    status: "Aggregate statistical estimate from logbooks and sampling"
    coverage: "Mediterranean only, 2017-2024, EU member state vessels only"
    notes: "No coverage for Libya, Tunisia, eastern Mediterranean, North Africa. C-squares with fewer than three vessels suppressed for confidentiality."

  - source: "TMT Combined IUU Vessel List"
    content: "369 vessels from 13 RFMOs, mirrors EU IUU list under Article 30 of Reg 1005/2008"
    status: "Enforcement action — RFMO and EU IUU listing"
    coverage: "64 vessels with MMSI, 168 with IMO. GFCM-listed 3.0x, other RFMO 2.0x"
    notes: "Matching priority MMSI, IMO, name exact, name fuzzy. Authority-level tagging is future work."

  - source: "ICCAT Record of Vessels"
    content: "9,203 vessels Med-authorised for SWO, ALB, BFT, or carrier operation"
    status: "Authorisation — opportunity indicator, not risk in isolation"
    coverage: "786 vessels with IMO"
    notes: "Applied conditionally on behavioural signal. See ICCAT framing note."

  - source: "OFAC SDN list"
    content: "US Treasury specially designated nationals"
    status: "Formal sanctions listing (US authority)"
    coverage: "Global, but less directly relevant for Med fisheries than EU sanctions"
    notes: "No fuzzy matching — false positives have legal consequences. EU consolidated sanctions list is named as the next integration priority."

epistemological_separation: |
  Each data source answers a different question and is kept separate at
  the data layer. GFW provides AIS-inferred behavioural events; FDI
  provides aggregate statistical estimates; TMT provides enforcement
  actions from both RFMO and EU sources; ICCAT provides authorisation as
  an opportunity indicator; OFAC provides formal US sanctions listings.
  The sources are synthesised at the scoring layer with provenance
  preserved in the UI.

methodology_references:
  - title: Global Fishing Watch transshipment detection methodology
    citation: Miller et al. 2018
    relevance: Defines encounter criteria implemented in compute_risk_score.

  - title: Deceptive Shipping Practices
    citation: Kpler, October 2025 (Ampatzidis, Li, Kotsias)
    relevance: Compounding behavioural risk model. Reports 80.1% of sanctioned spoofing vessels designated within 12 months.

  - title: The Turning Tides — Maritime Risk and Compliance Insights 2025-2026
    citation: Kpler, December 2025 (Subasic, Ampatzidis, Li)
    relevance: Introduces Low-to-Critical risk band vocabulary. Validates October predictive cohort (302 flagged, 42 sanctioned by December — 14% confirmation).

  - title: How to build a risk tree to assess shadow fleet exposure
    citation: Kpler blog, April 2026
    relevance: Source for the risk tree framework structure adapted in this project.

  - title: Council Regulation (EC) No 1005/2008 — EU IUU Regulation
    citation: EU 2008, amended by Regulation (EU) 2023/2842 (in force 9 January 2024)
    relevance: Establishes the EU IUU vessel list (Article 30), catch certification, yellow/red card system. The 2024 amendment mandates risk-based control targeting and beneficial ownership obligations — regulatory demand for scoring tools of this kind.

scope_and_limitations: |
  Geographic. Mediterranean polygon only. FDI covers EU member state
  fleets only — no coverage for Libya, Tunisia, eastern Mediterranean,
  North Africa.

  Temporal. FDI reliable from 2017 onwards. Live mode pulls current GFW
  events subject to API rate limits; static mode uses a fixed 86-event
  demo dataset.

  Spatial resolution. GFW events are point-level; FDI is aggregated to
  0.5 degree c-squares. Joining loses precision.

  Confidentiality suppression. FDI c-squares with fewer than three
  vessels are suppressed by Eurostat.

  Detection substrate. The model relies on AIS-inferred events from GFW.
  Kpler's detection stack combines AIS with analyst-verified satellite
  imagery, which provides ground-truth confirmation for dark port calls
  and direct detection of AIS spoofing — neither of which are available
  from AIS inference alone. This is a legitimate substrate difference
  and a named area for future integration.

  Validation. Risk scores are methodology-driven, not empirically
  calibrated against enforcement outcomes. Validation would require
  proxy outcomes such as RFMO IUU list additions or port state denials.

  Identity matching. Subject to false positives on common vessel names.
  Minimum name length four characters; all name matches require exact
  string match. OFAC uses no fuzzy matching.

  Authority tagging. TMT aggregates RFMO and EU IUU listings but does
  not tag by issuing authority. Authority-level filtering is future work.

  Descriptive not predictive. The app assigns risk given observed
  behaviour; it does not forecast future enforcement. Kpler's predictive
  claims are based on a designation dataset that does not yet exist for
  fisheries IUU at comparable scale.
